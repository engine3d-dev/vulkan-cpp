name: Macos Armv8

# workflow_call to have mac.yml be able to be invoked by ci.yml
on: [workflow_call]

jobs:
    setup-environments:
      uses: ./.github/workflows/platform-config.yml
      secrets: inherit
    macos-build:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            # - name: Install Homebrew
            #   run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

            # - name: Install LLVM
            #   run: |
            #     brew install python pipx

            # - name: Install Vulkan SDK
            #   uses: humbletim/setup-vulkan-sdk@v1.2.1
            #   with:
            #     vulkan-query-version: 1.4.304.1
            #     vulkan-components: Vulkan-Headers, Vulkan-Loader
            #     vulkan-use-cache: true
            - name: Restore macOS Environment Cache
              uses: actions/cache@v4
              with:
                path: |
                  ~/.local/share/pipx
                  ~/.conan2
                  ${{ github.workspace }}/vulkan_sdk
                key: ${{ needs.setup-environments.outputs.cache-key-armv8 }}

            - name: Expose Tools to macOS Environment
              run: |
                echo "$HOME/.local/bin" >> $GITHUB_PATH
                echo "${{ github.workspace }}/vulkan_sdk/bootstrapped/bin" >> $GITHUB_PATH
                echo "VULKAN_SDK=${{ github.workspace }}/vulkan_sdk/bootstrapped" >> $GITHUB_ENV

            - name: Installing conan
              run: |
                pipx install "conan>=2.18.2"
                pipx upgrade conan

            - name: Installing clang-tidy
              run: sudo ln -s $(brew --prefix llvm)/bin/clang-tidy /usr/local/bin/

            - name: Install Rosetta
              run: /usr/sbin/softwareupdate --install-rosetta --agree-to-license

            - name: Setting up Conan configuration
              run: |
                conan config install https://github.com/engine3d-dev/conan-config.git
                conan atlas setup

            - name: Creating Release build for vulkan-cpp
              run: conan atlas create . -s build_type=Release
          
            - name: Creating Debug build for vulkan-cpp
              run: conan atlas create . -s build_type=Debug

            - name: Creating MinSizeRel build for vulkan-cpp
              run: conan atlas create . -s build_type=MinSizeRel