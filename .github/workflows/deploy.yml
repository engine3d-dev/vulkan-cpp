
name: 🚀 Deployment

# Trigger deployment CI when PRs get merged to main (production branch)
on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_call:

jobs:
  windows:
    uses: engine3d-dev/ci/.github/workflows/windows.yml@main
    with:
      package_name: "vulkan-cpp"
      version: "6.0"
    secrets: inherit

  linux:
    uses: engine3d-dev/ci/.github/workflows/deploy_linux.yml@main
    with:
      package_name: "vulkan-cpp"
      version: "6.0"
    secrets: inherit

  mac-armv8:
    uses: engine3d-dev/ci/.github/workflows/deploy_mac.yml@main
    with:
      package_name: "vulkan-cpp"
      version: "6.0"
    secrets: inherit