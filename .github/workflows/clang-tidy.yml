name: cpp-linter

on: [pull_request]


jobs:
  cpp-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: '' # Disables clang-format so it strictly runs clang-tidy
          config-file: '.clang-tidy'
          extensions: 'cpp,cppm,h,hpp' # common C++ file extensions
          files-changed-only: true
          thread-comments: false
          # Ensure clang-tidy knows how to parse modern C++ headers/modules without a compile_commands.json
          extra-args: '-x c++ -std=c++23' 

      - name: Fail Build on Linter Deficiencies
        # Fix evaluation check to ensure a rigorous boolean comparison
        if: steps.linter.outputs.checks-failed != '0'
        run: |
          echo "Clang-Tidy detected architectural or style deficiencies."
          echo "Total violations reported: ${{ steps.linter.outputs.checks-failed }}"
          exit 1