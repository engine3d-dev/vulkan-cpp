name: 🛠️ Continous Integration

on: [pull_request]

jobs:
  # Setting up this environment first
  setup_environments:
    uses: ./.github/workflows/platform-config.yml
    secrets: inherit
  # windows:
  #   uses: ./.github/workflows/windows.yml
  #   secrets: inherit
  windows:
    needs: setup_environments
    uses: ./.github/workflows/windows.yml
    with:
      cache-key: ${{ needs.setup_environments.outputs.cache-key-windows }}
    secrets: inherit

