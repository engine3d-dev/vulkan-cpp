jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Windows Environment Cache
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Packages\PythonSoftwareFoundation*
            ~\AppData\Local\Programs\Python*
            ~\.conan2
            ${{ github.workspace }}\vulkan_sdk
          key: ${{ inputs.cache-key }}

      - name: Expose Tools to Windows Environment
        shell: pwsh
        run: |
          # Dynamically locate where conan.exe lives inside the restored paths
          $ConanBin = (Get-ChildItem -Path ~\AppData\Local -Filter conan.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if ($ConanBin) {
              $ConanDir = Split-Path -Path $ConanBin -Parent
              echo "$ConanDir" >> $ENV:GITHUB_PATH
          }
          
          # Expose Vulkan SDK
          echo "${{ github.workspace }}\vulkan_sdk\bootstrapped\bin" >> $ENV:GITHUB_PATH
          echo "VULKAN_SDK=${{ github.workspace }}\vulkan_sdk\bootstrapped" >> $ENV:GITHUB_ENV

      - name: Creating Release build for vulkan-cpp
        shell: pwsh
        run: conan atlas create . -s build_type=Release
        
      - name: Creating Debug build for vulkan-cpp
        shell: pwsh
        run: conan atlas create . -s build_type=Debug

      - name: Creating MinSizeRel build for vulkan-cpp
        shell: pwsh
        run: conan atlas create . -s build_type=MinSizeRel